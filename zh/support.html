    <h2>常见问题</h2>

    <h2>识鸟功能如何使用？</h2>
    <p>拍摄或从相册导入鸟类照片，App 会自动识别鸟种。你可以确认识别结果后保存到个人图鉴。</p>

    <h2>我的数据存储在哪里？</h2>
    <p>所有数据保存在你的设备上，我们不会将你的照片或记录上传到任何服务器。</p>

    <h2>如何注销账号？</h2>
    <p>观鸟日记不在外部服务器存储任何数据。删除 App 即可完全清除所有数据。</p>
